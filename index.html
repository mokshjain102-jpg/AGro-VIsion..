<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgroAI Pro</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="bg"></div>

<header>
  <h1 class="logo">🌱 AgroAI</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Insights</a>
    <a href="#">History</a>
    <a href="#">Login</a>
  </nav>
</header>

<section class="hero">
  <h2 class="title">AI Crop Intelligence</h2>
  <p>Next-gen farming powered by Machine Learning</p>

  <input class="search" placeholder="🔍 Ask AI about crops, diseases..." />

  <div class="upload-card">
    <input type="file" id="imageInput">
    <button onclick="uploadImage()">Predict</button>
    <img id="preview">
  </div>
</section>

<section class="dashboard">
  <h2>Analytics Dashboard</h2>

  <div class="grid">
    <div class="box glow">
      <h3>🌾 Crop</h3>
      <p id="crop">---</p>
    </div>

    <div class="box glow">
      <h3>🦠 Disease</h3>
      <p id="disease">---</p>
    </div>

    <div class="box glow">
      <h3>💊 Cure</h3>
      <p id="cure">---</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 AgroAI | Smart Farming Future</p>
</footer>

<script src="script.js"></script>
</body>
</html>
