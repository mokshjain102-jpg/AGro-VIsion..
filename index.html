<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroVision AI</title>

<link rel="stylesheet" href="style.css">

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
</head>

<body>

<div id="particles-js"></div>

<nav>
<h2>🌿 AgroVision</h2>
<div>
<a href="#">Home</a>
<a href="#scan">Scan</a>
<a href="#dash">Dashboard</a>
</div>
</nav>

<section class="hero">
<h1>AI Crop Disease Detection</h1>
<p>Smart Farming Assistant</p>
<button onclick="scrollToScan()">Scan Crop</button>
</section>

<section class="features">
<div class="card" data-aos="zoom-in">🌿 Detection</div>
<div class="card" data-aos="zoom-in">📊 Severity</div>
<div class="card" data-aos="zoom-in">🌦 Weather</div>
<div class="card" data-aos="zoom-in">💊 Treatment</div>
</section>

<section class="weather">
<h2>Live Weather</h2>
<div id="weather">Loading...</div>
</section>

<section class="upload" id="scan">
<h2>Upload Crop Image</h2>
<input type="file" id="fileInput">
<button onclick="analyze()">Analyze</button>
<div id="output" class="result"></div>
</section>

<section id="dash">
<h2>Dashboard</h2>
<canvas id="chart"></canvas>
</section>

<div id="chatbot">
<div id="chat-header">AI Assistant</div>
<div id="chat-body"></div>
<div id="chat-input">
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="script.js"></script>

</body>
</html>
