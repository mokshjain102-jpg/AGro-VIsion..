<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroVision AI</title>

<link rel="stylesheet" href="style.css">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<nav>
  <h2>🌿 AgroVision</h2>
  <div>
    <a href="#">Home</a>
    <a href="#scan">Scan</a>
    <a href="#dash">Dashboard</a>
  </div>
</nav>

<!-- PARALLAX -->
<section class="parallax">
  <div class="overlay"></div>
  <div class="hero">
    <h1>AI Crop Detection</h1>
    <p>Smart Farming Assistant</p>
    <button onclick="scrollToScan()">Scan Now</button>
  </div>
</section>

<!-- FEATURES -->
<section class="features">
  <div class="card">🌿 Disease Detection</div>
  <div class="card">📊 Severity</div>
  <div class="card">🌦 Weather Risk</div>
  <div class="card">💊 Treatment</div>
</section>

<!-- WEATHER -->
<section class="weather">
  <h2>Live Weather</h2>
  <div id="weather">Loading...</div>
</section>

<!-- SCAN -->
<section id="scan" class="upload">
  <h2>Upload Crop Image</h2>
  <input type="file" id="fileInput">
  <button onclick="analyze()">Analyze</button>
  <div id="output"></div>
</section>

<!-- DASHBOARD -->
<section id="dash">
  <h2>Dashboard</h2>
  <canvas id="chart"></canvas>
</section>

<!-- CHAT -->
<div id="chatbox">
  <div id="chatMessages"></div>
  <input id="userInput" placeholder="Ask about crops...">
  <button onclick="sendMessage()">Send</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="script.js"></script>

</body>
</html>
