<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgroVision AI Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* BODY */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(270deg,#0f2027,#203a43,#2c5364);
  background-size: 600% 600%;
  animation: bgMove 12s ease infinite;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* BG ANIMATION */
@keyframes bgMove {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

/* HEADER */
header {
  padding: 15px 30px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  font-size: 20px;
}

/* CHAT AREA */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* MESSAGE */
.message {
  max-width: 60%;
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
  animation: fadeIn 0.5s ease;
}

/* USER */
.user {
  background: #00ffd5;
  color: black;
  margin-left: auto;
}

/* AI */
.ai {
  background: rgba(255,255,255,0.1);
}

/* INPUT */
.input-area {
  display: flex;
  padding: 10px;
  background: rgba(255,255,255,0.05);
}

input {
  flex: 1;
  padding: 15px;
  border-radius: 20px;
  border: none;
}

button {
  padding: 10px 20px;
  margin-left: 10px;
  border-radius: 20px;
  border: none;
  background: #00ffd5;
  cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1;}
}

</style>
</head>

<body>

<header>
  🤖 AgroVision AI Assistant
</header>

<div class="chat-container" id="chat"></div>

<div class="input-area">
  <input id="userInput" placeholder="Ask about crops, diseases..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>

// ================= SEND MESSAGE =================
function sendMessage() {
  let input = document.getElementById("userInput");
  let text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    fakeAI(text);
  }, 500);
}

// ================= ADD MESSAGE =================
function addMessage(text, type) {
  let chat = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.className = "message " + type;
  msg.innerText = text;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

// ================= FAKE AI =================
function fakeAI(text) {
  let response = "AI: ";

  if (text.toLowerCase().includes("disease")) {
    response += "Crop disease detected may require pesticide.";
  } else if (text.toLowerCase().includes("weather")) {
    response += "Weather seems good for farming.";
  } else {
    response += "Use proper irrigation and monitor crop health.";
  }

  typeEffect(response);
}

// ================= TYPING EFFECT =================
function typeEffect(text) {
  let chat = document.getElementById("chat");

  let msg = document.createElement("div");
  msg.className = "message ai";
  chat.appendChild(msg);

  let i = 0;

  function typing() {
    if (i < text.length) {
      msg.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 20);
      chat.scrollTop = chat.scrollHeight;
    }
  }

  typing();
}

</script>

</body>
</html>
