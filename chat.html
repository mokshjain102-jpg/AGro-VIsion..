<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishi AI Chat</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:15px;
background:#1e293b;
text-align:center;
font-size:20px;
}

#chat-box{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
margin:10px 0;
padding:10px;
border-radius:10px;
max-width:70%;
}

.user{background:#22c55e;align-self:flex-end;}
.bot{background:#334155;}

#input-area{
display:flex;
padding:10px;
background:#1e293b;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
}

button{
margin-left:10px;
padding:10px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>🌱 Krishi AI Assistant</header>

<div id="chat-box"></div>

<div id="input-area">
<input id="input" placeholder="Ask anything about farming...">
<button onclick="send()">Send</button>
</div>

<script>

function addMsg(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
document.getElementById("chat-box").appendChild(div);
}

// ⚡ FAKE AI (abhi)
function send(){
let input=document.getElementById("input");
let msg=input.value;

addMsg(msg,"user");

// temporary reply
addMsg("Thinking...","bot");

// 👉 YAHAN BAAD ME REAL API LAGEGI
setTimeout(()=>{
document.querySelectorAll(".bot").pop?.remove;

document.querySelector("#chat-box").lastChild.innerText =
"AI answer: "+msg+" (real AI connect karne par yahan real answer aayega)";
},1000);

input.value="";
}

</script>

</body>
</html>
